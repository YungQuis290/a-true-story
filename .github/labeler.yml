# =====================================================
# LABELER CONFIG FOR GODOT PROJECT
# Labels must already exist in GitHub
# =====================================================

# Limit noisy PRs from getting too many file-based labels
changed-files-labels-limit: 4

# scenes
# Changes to Godot scenes (.tscn) and scene files inside the scenes folder
scenes:
  - changed-files:
      - any-glob-to-any-file:
          - "scenes/**/*.tscn"
          - "scenes/**/*.tres"

# scripts
# Changes to non-UI game scripts
scripts:
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/**/*.gd"
          - "scripts/**/*.cs"
      - all-globs-to-all-files:
          - "!scripts/ui/**"

# assets
# Changes to game art, audio, and other assets inside assets/
assets:
  - changed-files:
      - any-glob-to-any-file:
          - "assets/**"

# gameplay
# Changes to core gameplay systems
gameplay:
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/gameplay/**"

# combat
# Changes to combat systems
combat:
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/combat/**"

# ui
# Changes to UI scenes or UI scripts
ui:
  - changed-files:
      - any-glob-to-any-file:
          - "scenes/ui/**"
          - "scripts/ui/**"

# docs
# Documentation updates
docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "README.md"
          - "*.md"

# ci
# GitHub workflows and automation
ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

# bug
# Fix branches
bug:
  - head-branch:
      - "^fix($|/|-)"
      - "^bug($|/|-)"
      - "^hotfix($|/|-)"

# feature
# Feature branches
feature:
  - head-branch:
      - "^feature($|/|-)"
      - "^feat($|/|-)"
